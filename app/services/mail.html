<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px; border-radius: 10px 10px 0 0; text-align: center;">
        <h1 style="color: white; margin: 0; font-size: 24px;">🔐 Код верификации</h1>
    </div>
    
    <div style="background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none;">
        <p style="font-size: 16px; margin-bottom: 20px;">Здравствуйте!</p>
        
        <p style="font-size: 16px; margin-bottom: 20px;">
            Ваш код верификации для доступа к <strong>IzdeSim Bot</strong>:
        </p>
        
        <div style="background: white; border: 2px dashed #667eea; border-radius: 8px; padding: 20px; margin: 25px 0; text-align: center;">
            <div style="font-size: 36px; font-weight: bold; color: #667eea; letter-spacing: 8px; font-family: 'Courier New', monospace;">
                {code}
            </div>
        </div>
        
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
            ⏰ Код действителен в течение <strong>5 минут</strong>.
        </p>
        
        <div style="background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; margin: 20px 0; border-radius: 4px;">
            <p style="margin: 0; font-size: 14px; color: #856404;">
                ⚠️ Если вы не запрашивали этот код, просто проигнорируйте это письмо.
            </p>
        </div>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center;">
            <p style="font-size: 14px; color: #888; margin: 0;">
                С уважением,<br>
                <strong>IzdeSim Bot</strong>
            </p>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 20px; color: #888; font-size: 12px;">
        <p>Это автоматическое сообщение, пожалуйста, не отвечайте на него.</p>
    </div>
</body>
</html>
